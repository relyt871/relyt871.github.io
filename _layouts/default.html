<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <link
    rel="stylesheet"
    href="{{ '/assets/css/style.css' | relative_url }}"
  >


  <script>

    window.MathJax = {

      tex: {
  
        inlineMath: [
          ["$", "$"],
          ["\\(", "\\)"]
        ],
  
        displayMath: [
          ["$$", "$$"],
          ["\\[", "\\]"]
        ],
  
        processEscapes: true
  
      }

    };

  </script>


  <script
    defer
    src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js"
  >
  </script>

</head>


<body
  data-goatcounter-code="{{ site.goatcounter_code }}"
>

  <header class="site-header">

    <div class="header-inner">

      <a
        class="site-title"
        href="{{ '/' | relative_url }}"
      >
        {{ site.title }}
      </a>


      <nav
        class="site-navigation"
        aria-label="Main navigation"
      >

        <a href="{{ '/' | relative_url }}">
          Blogs
        </a>

        <a href="{{ '/about/' | relative_url }}">
          About Me
        </a>

      </nav>

    </div>

  </header>


  <main class="page-content">

    {{ content }}

  </main>

  <footer class="site-footer">

    <div class="footer-inner">

      <span>

        Total site visits:

        <span
          class="visit-count"
          data-visit-path="TOTAL"
        >
          —
        </span>

      </span>

    </div>

  </footer>


  <script
    src="{{ '/assets/js/visitor-counts.js' | relative_url }}"
  >
  </script>


  <script
    data-goatcounter="
      https://{{ site.goatcounter_code }}.goatcounter.com/count
    "

    async

    src="https://gc.zgo.at/count.js"
  >
  </script>
  
</body>

</html>
