<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <link
    rel="stylesheet"
    href="{{ '/assets/css/style.css' | relative_url }}"
  >

</head>


<body>

  <header class="site-header">

    <div class="header-inner">

      <a
        class="site-title"
        href="{{ '/' | relative_url }}"
      >
        {{ site.title }}
      </a>


      <nav
        class="site-navigation"
        aria-label="Main navigation"
      >

        <a href="{{ '/' | relative_url }}">
          Blogs
        </a>

        <a href="{{ '/about/' | relative_url }}">
          About Me
        </a>

      </nav>

    </div>

  </header>


  <main class="page-content">

    {{ content }}

  </main>

</body>

</html>
