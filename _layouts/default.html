<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>
    {% if page.title %}
      {{ page.title }} | {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <link
    rel="stylesheet"
    href="{{ '/assets/css/style.css' | relative_url }}"
  >

  <!-- Syntax highlighting theme -->

<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css"
>


<!-- Syntax highlighting engine -->

<script
  defer
  src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"
>
</script>


<script>

  document.addEventListener(
    "DOMContentLoaded",
    function () {

      if (!window.hljs) {
        return;
      }


      document
        .querySelectorAll(
          ".post-content pre code"
        )
        .forEach(
          function (codeBlock) {

            hljs.highlightElement(
              codeBlock
            );

          }
        );

    }
  );

</script>


  <script>

    window.MathJax = {

      tex: {
  
        inlineMath: [
          ["$", "$"],
          ["\\(", "\\)"]
        ],
  
        displayMath: [
          ["$$", "$$"],
          ["\\[", "\\]"]
        ],
  
        processEscapes: true
  
      }

    };

  </script>


  <script
    defer
    src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js"
  >
  </script>

</head>


<body>

  <header class="site-header">

    <div class="header-inner">

      <a
        class="site-title"
        href="{{ '/' | relative_url }}"
      >
        {{ site.title }}
      </a>


      <nav
        class="site-navigation"
        aria-label="Main navigation"
      >

        <a href="{{ '/' | relative_url }}">
          Blogs
        </a>

        <a href="{{ '/about/' | relative_url }}">
          About Me
        </a>

      </nav>

    </div>

  </header>


  <main class="page-content">

    {{ content }}

  </main>


  <script
    data-goatcounter="https://relyt871.goatcounter.com/count"
    async
    src="https://gc.zgo.at/count.js"
  >
  </script>

  <script
    src="{{ '/assets/js/header-behavior.js' | relative_url }}"
  >
  </script>

  <script
    src="{{ '/assets/js/external-links.js' | relative_url }}"
  >
  </script>
  
</body>

</html>
